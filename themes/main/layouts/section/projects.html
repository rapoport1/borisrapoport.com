{{ define "main" }}
<div class="container projects-page">

  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ if .Description }}
    <p class="page-description">{{ .Description }}</p>
    {{ end }}
  </header>

  <div class="projects-grid">
    {{ range .Pages }}
    {{ if not .Params.draft }}
    <article class="project-card">
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      <p class="project-description">{{ .Description }}</p>
      <div class="project-links">
        {{ if .Params.github }}
        <a href="{{ .Params.github }}" class="project-link" target="_blank" rel="noopener noreferrer">GitHub →</a>
        {{ end }}
        {{ if .Params.live }}
        <a href="{{ .Params.live }}" class="project-link" target="_blank" rel="noopener noreferrer">Live Demo →</a>
        {{ end }}
      </div>
    </article>
    {{ end }}
    {{ end }}
  </div>

</div>
{{ end }}
