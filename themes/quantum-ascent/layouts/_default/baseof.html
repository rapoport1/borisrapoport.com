<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ .Site.Params.description }}">
  <meta name="author" content="{{ .Site.Params.author }}">
  
  <!-- Security & Privacy -->
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  
  <!-- OpenGraph for social sharing -->
  <meta property="og:title" content="{{ .Title | default .Site.Title }}">
  <meta property="og:description" content="{{ .Description | default .Site.Params.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  
  <title>{{ .Title | default .Site.Title }}</title>
  
  <!-- Fonts (system stack + optional Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- Theme CSS -->
  <link rel="stylesheet" href="{{ "css/quantum-ascent.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/animations.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/responsive.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/hero-nebula.css" | relURL }}">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ "images/favicon.svg" | relURL }}">
</head>
<body>
  <!-- Animated nebula background -->
  <div class="nebula-bg">
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="nebula nebula-3"></div>
    <div class="starfield"></div>
  </div>

  <!-- Navigation -->
  {{ partial "nav.html" . }}

  <!-- Main content -->
  <main class="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  <!-- Footer -->
  {{ partial "footer.html" . }}

  <!-- No external JS frameworks — CSS handles all interactions -->
</body>
</html>
