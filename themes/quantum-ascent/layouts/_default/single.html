{{ define "main" }}
<div class="container single-page">
  <h1>{{ .Title }}</h1>

  {{ .Content }}

  <div style="display:flex; gap:0.75rem; flex-wrap:wrap; margin-top:2rem;">
    {{ if .Params.github }}
    <a href="{{ .Params.github }}" class="btn btn-secondary" target="_blank" rel="noopener noreferrer">View on GitHub →</a>
    {{ end }}
    {{ if .Params.live }}
    <a href="{{ .Params.live }}" class="btn btn-primary" target="_blank" rel="noopener noreferrer">Live Demo →</a>
    {{ end }}
  </div>
</div>
{{ end }}
