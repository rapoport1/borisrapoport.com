{{ define "main" }}
<!-- Hero Section with Nebula Background -->
<section class="hero-nebula">
  <div class="nebula-container">
    <img src="{{ "images/eskimo-nebula.svg" | relURL }}" alt="Eskimo Nebula" class="nebula-image" />
    <div class="nebula-overlay"></div>
  </div>

  <div class="hero-nebula-content">
    <div class="hero-nebula-text glass-card">
      <h1 class="hero-name">{{ .Site.Title }}</h1>
      <p class="hero-tagline">Building reliable systems and exploring the cosmos</p>
      
      <div class="hero-cta">
        <a href="/projects/" class="btn btn-primary">View Projects</a>
        <a href="https://www.linkedin.com/in/rapoporb1/" class="btn btn-secondary">Connect on LinkedIn</a>
      </div>
    </div>
  </div>

  <!-- Scroll Indicator -->
  <div class="scroll-indicator">
    <span>Scroll to explore</span>
    <div class="scroll-arrow">↓</div>
  </div>
</section>

<!-- Quick Access Cards -->
<section class="quick-access">
  <div class="container">
    <div class="quick-nav-grid">
      <a href="/about/" class="quick-nav-card glass-card">
        <h3>About</h3>
        <p>My journey through physics, climbing, and automation</p>
      </a>
      <a href="/projects/" class="quick-nav-card glass-card">
        <h3>Projects</h3>
        <p>Tools, labs, and things I've built</p>
      </a>
    </div>
  </div>
</section>

{{ end }}
