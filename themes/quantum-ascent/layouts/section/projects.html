{{ define "main" }}
<main class="section-page projects-page">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ if .Description }}
    <p class="page-description">{{ .Description }}</p>
    {{ end }}
  </header>

  <div class="projects-grid">
    {{ range .Pages }}
    <article class="project-card glass-card">
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      <p class="project-description">{{ .Description }}</p>
      {{ if .Params.github }}
      <a href="{{ .Params.github }}" class="project-link">View on GitHub →</a>
      {{ end }}
      {{ if .Params.live }}
      <a href="{{ .Params.live }}" class="project-link">Live Demo →</a>
      {{ end }}
    </article>
    {{ end }}
  </div>
</main>
{{ end }}
