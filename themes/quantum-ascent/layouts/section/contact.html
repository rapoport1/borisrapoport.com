{{ define "main" }}
<div class="container contact-page">

  <header class="page-header">
    <h1>Get in Touch</h1>
    <p class="page-description">Questions about automation, QA, or working together.</p>
  </header>

  <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <div class="form-group">
      <label for="name" class="form-label">Name</label>
      <input type="text" id="name" name="name" class="form-input" required placeholder="Your name">
    </div>

    <div class="form-group">
      <label for="email" class="form-label">Email</label>
      <input type="email" id="email" name="email" class="form-input" required placeholder="you@example.com">
    </div>

    <div class="form-group">
      <label for="message" class="form-label">Message</label>
      <textarea id="message" name="message" class="form-textarea" required placeholder="What's on your mind?"></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Send Message</button>
  </form>

  <p class="contact-alt">Or reach me on <a href="{{ .Site.Params.linkedin }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>.</p>

</div>
{{ end }}
