<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="nebula-core" cx="50%" cy="50%" r="30%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ec4899;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.1" />
    </radialGradient>
    <radialGradient id="ring-glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:0" />
      <stop offset="70%" style="stop-color:#7c3aed;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.2" />
    </radialGradient>
  </defs>
  
  <!-- Core glow -->
  <circle cx="50" cy="50" r="15" fill="url(#nebula-core)" />
  
  <!-- Ring structure -->
  <ellipse cx="50" cy="50" rx="32" ry="28" fill="none" stroke="url(#ring-glow)" stroke-width="8" opacity="0.7" />
  
  <!-- Bright points on ring -->
  <circle cx="82" cy="50" r="2.5" fill="#f8fafc" opacity="0.8" />
  <circle cx="18" cy="50" r="2.5" fill="#f8fafc" opacity="0.8" />
  <circle cx="50" cy="22" r="2" fill="#f8fafc" opacity="0.6" />
  <circle cx="50" cy="78" r="2" fill="#f8fafc" opacity="0.6" />
  
  <!-- Central star -->
  <circle cx="50" cy="50" r="3" fill="#f97316" opacity="0.9" />
</svg>
